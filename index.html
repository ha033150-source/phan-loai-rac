<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Waste Classifier</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; background-color: #f0f2f5; }
        
        /* 1. Header xanh theo yêu cầu */
        .header { width: 100%; background-color: #3f51b5; color: white; text-align: center; padding: 25px 0; font-size: 26px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 2. Phần mô tả Web (Description) */
        .web-description { max-width: 700px; text-align: center; margin: 20px; color: #555; line-height: 1.6; }

        /* 3. Khung chính trắng */
        .container { width: 90%; max-width: 800px; background: white; border: 2px solid #000; margin-bottom: 30px; padding: 30px; display: flex; flex-direction: column; align-items: center; border-radius: 8px; }

        /* Khung Camera */
        #webcam-container { border: 5px solid #333; width: 320px; height: 320px; background-color: #000; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; overflow: hidden; border-radius: 4px; }

        /* 4. Khu vực hiển thị kết quả 2 cột */
        .label-container { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 15px; font-size: 18px; margin-bottom: 20px; }
        .label-item { display: flex; justify-content: space-between; padding: 10px; background: #f8f9fa; border-radius: 4px; border: 1px solid #ddd; }
        .label-name { font-weight: bold; color: #333; }
        .label-value { color: #3f51b5; font-family: monospace; }

        /* Nút điều khiển */
        button { padding: 12px 30px; font-size: 18px; cursor: pointer; background-color: #3f51b5; color: white; border: none; border-radius: 5px; transition: 0.3s; margin-bottom: 20px; }
        button:hover { background-color: #2c387e; transform: scale(1.05); }

        /* 5. Phần chân trang & Link hướng dẫn */
        .footer-guide { margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ccc; text-align: center; width: 100%; }
        .footer-guide a { color: #3f51b5; font-weight: bold; text-decoration: none; border-bottom: 2px solid #3f51b5; transition: 0.3s; }
        .footer-guide a:hover { color: #ff5722; border-bottom-color: #ff5722; }
    </style>
</head>
<body>

    <div class="header">PHÂN LOẠI RÁC THẢI - IMAGE MODEL</div>

    <div class="web-description">
        <p>Ứng dụng sử dụng trí tuệ nhân tạo (CNN) để nhận diện và phân loại rác thải sinh hoạt trong thời gian thực. Hãy đưa rác lại gần camera để bắt đầu.</p>
    </div>

    <div class="container">
        <div id="webcam-container">
            <span style="color: #fff;">Camera sẽ hiện tại đây</span>
        </div>
        
        <button type="button" onclick="init()">Bắt đầu nhận diện</button>

        <div id="label-container" class="label-container">
            </div>

        <div class="footer-guide">
            <p>Để xử lý rác đúng cách, bạn có thể tham khảo <a href="LINK_HUONG_DAN_CUA_BAN" target="_blank">tại đây</a>.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/KfJ6e8utrB/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(320, 320, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Xóa chữ chờ và hiện camera
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Xóa trắng trước khi hiện mới
            for (let i = 0; i < maxPredictions; i++) {
                let div = document.createElement("div");
                div.className = "label-item";
                div.innerHTML = `<span class="label-name"></span><span class="label-value">0.00</span>`;
                labelContainer.appendChild(div);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const probability = prediction[i].probability.toFixed(2);
                
                const item = labelContainer.childNodes[i];
                item.querySelector(".label-name").innerText = classPrediction;
                item.querySelector(".label-value").innerText = probability;

                // Highlight kết quả chính xác cao
                if (probability > 0.6) {
                    item.style.backgroundColor = "#e8f0fe";
                    item.style.borderColor = "#3f51b5";
                } else {
                    item.style.backgroundColor = "#f8f9fa";
                    item.style.borderColor = "#ddd";
                }
            }
        }
    </script>
</body>
</html>
